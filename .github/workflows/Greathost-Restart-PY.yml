name: Greathost-AutoRestart-PY

on:
  workflow_dispatch:        # 推荐：需要重启时手动到 Actions 页面点击运行
  #schedule:
  #  - cron: '0 20 * 1 *'    # 可选：每天 UTC 20:00 (北京时间凌晨 4:00) 自动重启一次

jobs:
  Auto_restart_greathost:
    runs-on: ubuntu-latest
    
    permissions:
      actions: write
      contents: read
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium==4.18.1 selenium-wire==5.1.0 blinker==1.7.0 requests

      - name: Run restart script
        env:
          GREATHOST_EMAIL: ${{ secrets.GREATHOST_EMAIL }}
          GREATHOST_PASSWORD: ${{ secrets.GREATHOST_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}    
          PROXY_URL: ${{ secrets.PROXY_URL }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }} # 可以把目标服务器名也写进 secret 方便复用
        run: python greathost_restart.py

      - name: Upload Error Page
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: restart-error-screenshot
          path: error_page.html
          retention-days: 3
